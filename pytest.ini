[pytest]
pythonpath = back
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning
markers =
    e2e: e2e с реальными вызовами чата и отчётом (нужен OPENAI_API_KEY и доступ к API)
# Покрытие и порог 70%: pytest --cov=src --cov-fail-under=70 --cov-report=term-missing
